<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontak - Zenovia SMP Chat</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'mc-bg': '#0B1120',        /* Latar belakang paling gelap */
                        'mc-panel': '#151E32',     /* Panel / Header biru gelap */
                        'mc-hover': '#1E293B',     /* Warna saat kontak disorot */
                        'mc-yellow': '#FBBF24',    /* Kuning emas Minecraft */
                        'mc-white': '#F8FAFC',     /* Putih bersih teks utama */
                        'mc-gray': '#94A3B8',      /* Abu-abu teks sekunder/waktu */
                    },
                    fontFamily: {
                        'sans': ['Poppins', 'sans-serif'],
                        'pixel': ['"Press Start 2P"', 'cursive'],
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #0B1120; }
        ::-webkit-scrollbar-thumb { background: #3B82F6; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #FBBF24; }
        * { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-mc-bg text-mc-white font-sans min-h-screen flex justify-center items-center">

    <!-- Container Utama Aplikasi -->
    <div class="w-full h-screen sm:h-[90vh] sm:w-[420px] sm:rounded-2xl sm:border border-slate-700 bg-mc-bg flex flex-col relative overflow-hidden shadow-2xl">
        
        <!-- ========================================== -->
        <!-- HEADER KONTAK                              -->
        <!-- ========================================== -->
        <header class="bg-mc-panel px-4 py-4 flex items-center z-10 shadow-md border-b border-slate-800">
            <!-- Tombol Kembali ke Menu Utama -->
            <a href="menu.html" class="text-mc-gray hover:text-mc-white transition-colors mr-4" title="Kembali">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </a>
            <div class="flex-1">
                <h1 class="font-pixel text-mc-yellow text-sm tracking-wide">BUKU KONTAK</h1>
                <p class="text-[10px] text-mc-gray font-sans mt-1">145 Pemain Terdaftar</p>
            </div>
            <!-- Tombol Tambah Teman -->
            <button class="text-mc-gray hover:text-mc-yellow transition-colors" title="Tambah Teman Baru">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                    <circle cx="8.5" cy="7" r="4"></circle>
                    <line x1="20" y1="8" x2="20" y2="14"></line>
                    <line x1="23" y1="11" x2="17" y2="11"></line>
                </svg>
            </button>
        </header>

        <!-- ========================================== -->
        <!-- BILAH PENCARIAN (SEARCH BAR)               -->
        <!-- ========================================== -->
        <div class="bg-mc-panel px-4 py-3 shadow-sm border-b border-slate-800/50 z-10">
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <svg class="w-4 h-4 text-slate-500" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </div>
                <input type="text" placeholder="Cari Nickname..." 
                       class="w-full pl-10 pr-4 py-2 bg-slate-900/50 border-2 border-slate-700 rounded-lg text-sm text-white placeholder-slate-500 focus:outline-none focus:border-mc-yellow transition-colors">
            </div>
        </div>

        <!-- ========================================== -->
        <!-- DAFTAR KONTAK (Scrollable)                 -->
        <!-- ========================================== -->
        <div class="flex-1 overflow-y-auto w-full pb-6">
            
            <!-- Kategori: Sedang Online -->
            <div class="px-5 py-2 mt-2">
                <h2 class="text-xs font-bold text-mc-gray tracking-wider">SEDANG ONLINE (2)</h2>
            </div>

            <!-- Kontak 1 -->
            <div class="flex items-center px-4 py-3 hover:bg-mc-hover cursor-pointer border-b border-slate-800/30 transition-colors group">
                <div class="w-11 h-11 rounded-lg bg-slate-800 flex-shrink-0 relative overflow-hidden border border-slate-700 shadow-sm">
                    <img src="https://minotar.net/helm/Alex/50.png" alt="Avatar Alex" class="w-full h-full object-cover">
                    <!-- Status Online (Hijau) -->
                    <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 rounded-full border-2 border-slate-800"></div>
                </div>
                <div class="ml-4 flex-1 overflow-hidden">
                    <h3 class="font-semibold text-white truncate text-sm flex items-center">
                        Alex_Pro 
                        <span class="ml-2 text-[8px] bg-mc-yellow text-slate-900 px-1.5 py-0.5 rounded font-pixel tracking-tighter">[VIP]</span>
                    </h3>
                    <p class="text-xs text-mc-gray truncate mt-0.5">Sedang berkeliling di Spawn Area.</p>
                </div>
                <!-- Tombol Chat Cepat (Hanya muncul jelas saat di-hover/di-tap) -->
                <button class="ml-2 w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center text-mc-gray group-hover:text-mc-yellow group-hover:bg-slate-700 transition-all border border-slate-700">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                </button>
            </div>

            <!-- Kontak 2 -->
            <div class="flex items-center px-4 py-3 hover:bg-mc-hover cursor-pointer border-b border-slate-800/30 transition-colors group">
                <div class="w-11 h-11 rounded-lg bg-slate-800 flex-shrink-0 relative overflow-hidden border border-slate-700 shadow-sm">
                    <img src="https://minotar.net/helm/Steve/50.png" alt="Avatar Steve" class="w-full h-full object-cover">
                    <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 rounded-full border-2 border-slate-800"></div>
                </div>
                <div class="ml-4 flex-1 overflow-hidden">
                    <h3 class="font-semibold text-white truncate text-sm">Steve_Miner</h3>
                    <p class="text-xs text-mc-gray truncate mt-0.5">⛏️ Berburu Netherite</p>
                </div>
                <button class="ml-2 w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center text-mc-gray group-hover:text-mc-yellow group-hover:bg-slate-700 transition-all border border-slate-700">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                </button>
            </div>

            <!-- Kategori: Offline -->
            <div class="px-5 py-2 mt-4">
                <h2 class="text-xs font-bold text-mc-gray tracking-wider">OFFLINE (2)</h2>
            </div>

            <!-- Kontak 3 -->
            <div class="flex items-center px-4 py-3 hover:bg-mc-hover cursor-pointer border-b border-slate-800/30 transition-colors group opacity-75">
                <div class="w-11 h-11 rounded-lg bg-slate-800 flex-shrink-0 relative overflow-hidden border border-slate-700 shadow-sm grayscale hover:grayscale-0 transition-all">
                    <img src="https://minotar.net/helm/Notch/50.png" alt="Avatar Notch" class="w-full h-full object-cover">
                    <!-- Status Offline (Abu-abu gelap) -->
                    <div class="absolute bottom-0 right-0 w-3 h-3 bg-slate-500 rounded-full border-2 border-slate-800"></div>
                </div>
                <div class="ml-4 flex-1 overflow-hidden">
                    <h3 class="font-semibold text-white truncate text-sm flex items-center">
                        Notch 
                        <span class="ml-2 text-[8px] bg-red-600 text-white px-1.5 py-0.5 rounded uppercase tracking-wider">[Owner]</span>
                    </h3>
                    <p class="text-[11px] text-slate-500 truncate mt-0.5">Terakhir terlihat: Kemarin 20:00</p>
                </div>
                <button class="ml-2 w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center text-mc-gray group-hover:text-white group-hover:bg-slate-700 transition-all border border-slate-700">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                </button>
            </div>

            <!-- Kontak 4 -->
            <div class="flex items-center px-4 py-3 hover:bg-mc-hover cursor-pointer border-b border-slate-800/30 transition-colors group opacity-75">
                <div class="w-11 h-11 rounded-lg bg-slate-800 flex-shrink-0 relative overflow-hidden border border-slate-700 shadow-sm grayscale hover:grayscale-0 transition-all">
                    <img src="https://minotar.net/helm/Herobrine/50.png" alt="Avatar Herobrine" class="w-full h-full object-cover">
                    <div class="absolute bottom-0 right-0 w-3 h-3 bg-slate-500 rounded-full border-2 border-slate-800"></div>
                </div>
                <div class="ml-4 flex-1 overflow-hidden">
                    <h3 class="font-semibold text-white truncate text-sm">Herobrine</h3>
                    <p class="text-[11px] text-slate-500 truncate mt-0.5">Terakhir terlihat: ???</p>
                </div>
                <button class="ml-2 w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center text-mc-gray group-hover:text-white group-hover:bg-slate-700 transition-all border border-slate-700">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                </button>
            </div>

        </div>

    </div>

    <!-- ========================================== -->
    <!-- KODE API FIREBASE (Sistem Mesin Belakang)  -->
    <!-- ========================================== -->
    <script type="module">
        // Import fungsi Firebase via CDN
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-analytics.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // Konfigurasi Firebase milikmu
        const firebaseConfig = {
            apiKey: "AIzaSyDHe6paBaXVPh6oUz-3SY-eLBa_F4PBeQQ",
            authDomain: "zeno-s-chat.firebaseapp.com",
            projectId: "zeno-s-chat",
            storageBucket: "zeno-s-chat.firebasestorage.app",
            messagingSenderId: "442363686283",
            appId: "1:442363686283:web:c15b29c5a680ba4bebd38e",
            measurementId: "G-QWLDWMBSXZ"
        };

        // Inisialisasi Firebase
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const auth = getAuth(app);

        console.log("Firebase berhasil dimuat di Halaman Kontak!");

        // Penjaga Halaman (Auth Guard)
        onAuthStateChanged(auth, (user) => {
            if (user) {
                console.log("Akses diizinkan. Melihat kontak untuk:", user.email);
            } else {
                console.warn("Akses ditolak! Pengguna belum login.");
                // Aktifkan baris di bawah ini nanti untuk mencegah akses tanpa login:
                // window.location.href = "login.html";
            }
        });

        // Interaksi klik sederhana pada kontak
        document.querySelectorAll('.group').forEach(contact => {
            contact.addEventListener('click', () => {
                console.log("Membuka chat personal...");
                // window.location.href = "chat-personal.html";
            });
        });
    </script>
</body>
</html>

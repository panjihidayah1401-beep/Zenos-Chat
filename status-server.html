<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status Server - Zenovia SMP</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'mc-bg': '#0B1120',
                        'mc-panel': '#151E32',
                        'mc-hover': '#1E293B',
                        'mc-yellow': '#FBBF24',
                        'mc-white': '#F8FAFC',
                        'mc-gray': '#94A3B8',
                        'mc-green': '#22C55E', /* Hijau untuk status Online */
                        'mc-red': '#EF4444',   /* Merah untuk status Offline */
                    },
                    fontFamily: {
                        'sans': ['Poppins', 'sans-serif'],
                        'pixel': ['"Press Start 2P"', 'cursive'],
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #0B1120; }
        ::-webkit-scrollbar-thumb { background: #3B82F6; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #FBBF24; }
        * { -webkit-tap-highlight-color: transparent; }
        
        /* Animasi loading sederhana */
        .loading-shimmer {
            background: linear-gradient(90deg, #1E293B 25%, #334155 50%, #1E293B 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="bg-mc-bg text-mc-white font-sans min-h-screen flex justify-center items-center">

    <!-- Container Utama -->
    <div class="w-full h-screen sm:h-[90vh] sm:w-[420px] sm:rounded-2xl sm:border border-slate-700 bg-mc-bg flex flex-col relative overflow-hidden shadow-2xl">
        
        <!-- HEADER -->
        <header class="bg-mc-panel px-4 py-4 flex items-center justify-between z-10 shadow-md border-b border-slate-800">
            <div class="flex items-center">
                <!-- Tombol Kembali -->
                <a href="menu.html" class="text-mc-gray hover:text-mc-white transition-colors mr-4" title="Kembali">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                </a>
                <h1 class="font-pixel text-mc-yellow text-[11px] tracking-wide mt-1">STATUS SERVER</h1>
            </div>
            <!-- Tombol Refresh API -->
            <button id="btn-refresh" class="text-mc-gray hover:text-mc-white transition-transform active:rotate-180" title="Muat Ulang Status">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="23 4 23 10 17 10"></polyline>
                    <polyline points="1 20 1 14 7 14"></polyline>
                    <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                </svg>
            </button>
        </header>

        <!-- KONTEN UTAMA (Scrollable) -->
        <div class="flex-1 overflow-y-auto w-full p-4">
            
            <!-- Banner IP & Status (Diperbarui oleh API) -->
            <div class="bg-mc-panel border-2 border-slate-700 rounded-xl p-5 mb-6 relative overflow-hidden shadow-lg">
                <!-- Ornamen Latar Belakang -->
                <div class="absolute -right-6 -bottom-6 opacity-10">
                    <svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L2 22h20L12 2zm0 4.5l7.5 13.5h-15L12 6.5z"/></svg>
                </div>
                
                <h2 class="text-xs text-mc-gray font-bold tracking-widest mb-1">ZENOVIA SMP</h2>
                <div class="flex justify-between items-end mb-4 relative z-10">
                    <div>
                        <p class="font-pixel text-sm text-white mt-1">n-1.nura.host</p>
                        <p class="text-[10px] text-mc-yellow font-sans mt-1">Port: 25546 (Bedrock)</p>
                    </div>
                    <!-- Indikator Online/Offline -->
                    <div class="flex items-center bg-slate-900 px-3 py-1.5 rounded-lg border border-slate-700 shadow-inner">
                        <div id="status-dot" class="w-3 h-3 rounded-full bg-slate-500 mr-2 shadow-[0_0_8px_rgba(0,0,0,0.5)]"></div>
                        <span id="status-text" class="text-xs font-bold text-mc-gray uppercase tracking-wider">MEMUAT...</span>
                    </div>
                </div>

                <!-- Kapasitas Pemain -->
                <div class="bg-slate-900/50 rounded-lg p-3 border border-slate-700/50 flex justify-between items-center relative z-10">
                    <span class="text-xs text-mc-gray">Pemain Aktif:</span>
                    <span id="player-count" class="font-pixel text-sm text-mc-white">-- / --</span>
                </div>
            </div>

            <!-- Daftar Pemain Online -->
            <div>
                <div class="flex justify-between items-end mb-3 px-1">
                    <h3 class="text-sm font-bold text-mc-yellow tracking-wide flex items-center">
                        <svg class="w-4 h-4 mr-1.5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                        DAFTAR PEMAIN
                    </h3>
                </div>

                <!-- Container List (Akan diisi oleh JavaScript) -->
                <div id="player-list-container" class="space-y-2 pb-6">
                    <!-- Efek Loading Skeleton (Akan hilang setelah API termuat) -->
                    <div class="flex items-center p-3 rounded-lg bg-mc-panel border border-slate-800 loading-shimmer">
                        <div class="w-10 h-10 rounded-md bg-slate-700"></div>
                        <div class="ml-3 flex-1 space-y-2">
                            <div class="h-3 bg-slate-700 rounded w-1/2"></div>
                            <div class="h-2 bg-slate-700 rounded w-1/3"></div>
                        </div>
                    </div>
                    <div class="flex items-center p-3 rounded-lg bg-mc-panel border border-slate-800 loading-shimmer">
                        <div class="w-10 h-10 rounded-md bg-slate-700"></div>
                        <div class="ml-3 flex-1 space-y-2">
                            <div class="h-3 bg-slate-700 rounded w-1/3"></div>
                            <div class="h-2 bg-slate-700 rounded w-1/4"></div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- ========================================== -->
    <!-- LOGIKA API STATUS MINECRAFT SERVER         -->
    <!-- ========================================== -->
    <script>
        // Konfigurasi IP Server (Gunakan IP yang sama seperti di toko)
        const SERVER_IP = "n-1.nura.host";
        const SERVER_PORT = "25546";
        // Karena ini Bedrock, kita pakai endpoint Bedrock dari mcsrvstat
        const API_URL = `https://api.mcsrvstat.us/bedrock/3/${SERVER_IP}:${SERVER_PORT}`;

        const statusText = document.getElementById('status-text');
        const statusDot = document.getElementById('status-dot');
        const playerCount = document.getElementById('player-count');
        const playerListContainer = document.getElementById('player-list-container');
        const btnRefresh = document.getElementById('btn-refresh');

        // Fungsi Utama untuk mengambil data dari API
        async function fetchServerStatus() {
            try {
                // Efek loading saat refresh ditekan
                statusText.innerText = "MEMUAT...";
                statusText.className = "text-xs font-bold text-mc-gray uppercase tracking-wider";
                statusDot.className = "w-3 h-3 rounded-full bg-slate-500 mr-2 shadow-[0_0_8px_rgba(0,0,0,0.5)]";
                
                const response = await fetch(API_URL);
                const data = await response.json();

                // Bersihkan daftar pemain (hilangkan skeleton loading)
                playerListContainer.innerHTML = '';

                if (data.online) {
                    // SERVER ONLINE
                    statusText.innerText = "ONLINE";
                    statusText.classList.replace('text-mc-gray', 'text-mc-green');
                    
                    statusDot.classList.replace('bg-slate-500', 'bg-mc-green');
                    statusDot.classList.add('animate-pulse'); // Efek denyut nyala

                    playerCount.innerText = `${data.players.online} / ${data.players.max}`;

                    // Tampilkan daftar nama pemain JIKA API menyediakannya
                    if (data.players.list && data.players.list.length > 0) {
                        data.players.list.forEach(player => {
                            // API Bedrock kadang mengembalikan object, kadang string
                            const playerName = typeof player === 'string' ? player : player.name;
                            
                            // Ambil avatar dari Minotar
                            const avatarUrl = `https://minotar.net/helm/${playerName}/50.png`;

                            // Buat elemen HTML untuk pemain
                            const playerCard = document.createElement('div');
                            playerCard.className = "flex items-center p-3 rounded-lg bg-mc-panel border border-slate-700/50 shadow-sm hover:bg-mc-hover transition-colors";
                            playerCard.innerHTML = `
                                <img src="${avatarUrl}" alt="${playerName}" class="w-10 h-10 rounded-md border border-slate-800" onerror="this.src='https://ui-avatars.com/api/?name=${playerName}&background=0f172a&color=fff'">
                                <div class="ml-3">
                                    <h4 class="text-sm font-semibold text-white">${playerName}</h4>
                                    <p class="text-[10px] text-mc-green flex items-center mt-0.5">
                                        <span class="w-1.5 h-1.5 bg-mc-green rounded-full mr-1.5"></span> Sedang Bermain
                                    </p>
                                </div>
                            `;
                            playerListContainer.appendChild(playerCard);
                        });
                    } else if (data.players.online > 0) {
                        // Jika ada pemain, tapi API Bedrock tidak menampilkan namanya (sering terjadi di Bedrock)
                        playerListContainer.innerHTML = `
                            <div class="text-center bg-slate-900/50 border border-slate-700/50 rounded-lg p-5">
                                <span class="text-3xl block mb-2">🎮</span>
                                <p class="text-sm text-mc-white font-medium">Ada ${data.players.online} pemain di dalam server!</p>
                                <p class="text-xs text-mc-gray mt-1">Catatan: Sistem Bedrock menyembunyikan detail nama pemain.</p>
                            </div>
                        `;
                    } else {
                        // Jika server online tapi kosong
                        playerListContainer.innerHTML = `
                            <div class="text-center bg-slate-900/50 border border-slate-700/50 rounded-lg p-5">
                                <span class="text-3xl block mb-2">👻</span>
                                <p class="text-sm text-mc-gray">Server sedang sepi. Jadilah yang pertama masuk!</p>
                            </div>
                        `;
                    }

                } else {
                    // SERVER OFFLINE
                    statusText.innerText = "OFFLINE";
                    statusText.classList.replace('text-mc-gray', 'text-mc-red');
                    statusDot.classList.replace('bg-slate-500', 'bg-mc-red');
                    
                    playerCount.innerText = "0 / 0";
                    playerListContainer.innerHTML = `
                        <div class="text-center bg-slate-900/50 border border-red-900/30 rounded-lg p-5">
                            <span class="text-3xl block mb-2">🛑</span>
                            <p class="text-sm text-red-400 font-medium">Server Tidak Merespon</p>
                            <p class="text-xs text-mc-gray mt-1">Server mungkin sedang dimatikan (offline) atau dalam proses restart.</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error("Gagal mengambil status server:", error);
                statusText.innerText = "ERROR";
                statusDot.classList.replace('bg-slate-500', 'bg-mc-red');
                playerListContainer.innerHTML = `<p class="text-center text-xs text-red-500 mt-4">Gagal terhubung ke API Status.</p>`;
            }
        }

        // Panggil fungsi saat halaman dimuat
        window.addEventListener('load', fetchServerStatus);

        // Panggil fungsi saat tombol refresh ditekan
        btnRefresh.addEventListener('click', () => {
            // Putar ikon sebentar untuk efek visual
            btnRefresh.style.transform = 'rotate(180deg)';
            setTimeout(() => btnRefresh.style.transform = 'rotate(0deg)', 300);
            
            fetchServerStatus();
        });
    </script>

</body>
</html>
